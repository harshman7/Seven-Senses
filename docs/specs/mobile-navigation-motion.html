<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SEVEN SENSES — Mobile Navigation Design Specification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;family=Jost:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#c3c8c1",
                        "on-secondary-fixed": "#261900",
                        "surface-tint": "#506353",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e7e2da",
                        "surface-container-high": "#ece8e0",
                        "tertiary-fixed-dim": "#cbc5c0",
                        "error": "#ba1a1a",
                        "surface-container": "#f2ede5",
                        "on-tertiary-fixed-variant": "#494643",
                        "on-primary-fixed-variant": "#394b3c",
                        "inverse-surface": "#32302b",
                        "on-secondary-container": "#795f2b",
                        "secondary-container": "#fedb9b",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#b7ccb8",
                        "surface": "#fef9f1",
                        "on-tertiary-container": "#33312d",
                        "tertiary": "#615e5a",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#1d1b18",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#9d9893",
                        "on-surface-variant": "#434843",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "primary-container": "#8a9e8c",
                        "inverse-on-surface": "#f5f0e8",
                        "background": "#fef9f1",
                        "primary": "#506353",
                        "on-secondary-fixed-variant": "#5a4312",
                        "tertiary-fixed": "#e7e1dc",
                        "secondary-fixed": "#ffdea4",
                        "secondary-fixed-dim": "#e4c285",
                        "secondary": "#745a27",
                        "on-surface": "#1d1c17",
                        "primary-fixed": "#d3e8d4",
                        "surface-variant": "#e7e2da",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f8f3eb",
                        "surface-bright": "#fef9f1",
                        "primary-fixed-dim": "#b7ccb8",
                        "on-primary-container": "#243527",
                        "outline": "#737872",
                        "on-primary-fixed": "#0e1f13",
                        "on-background": "#1d1c17",
                        "surface-dim": "#ded9d2"
                    },
                    fontFamily: {
                        "headline": ["Cormorant Garamond", "serif"],
                        "serif-display": ["Cormorant Garamond", "serif"],
                        "body": ["Jost", "sans-serif"],
                        "label": ["Jost", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0rem", "lg": "0rem", "xl": "0rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fef9f1;
            color: #1d1c17;
            overflow: hidden; /* Prevent scrolling for the nav demo */
        }

        /* 1. Full-screen curtain fade-in */
        .curtain-fade {
            animation: curtainIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes curtainIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 3. Subtle vertical drift up (20px) as they fade in */
        .stagger-link {
            opacity: 0;
            transform: translateY(20px);
            animation: linkIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes linkIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. Staggered link appearance (0.1s delay) */
        .stagger-link:nth-child(1) { animation-delay: 0.2s; }
        .stagger-link:nth-child(2) { animation-delay: 0.3s; }
        .stagger-link:nth-child(3) { animation-delay: 0.4s; }
        .stagger-link:nth-child(4) { animation-delay: 0.5s; }
        .stagger-link:nth-child(5) { animation-delay: 0.6s; }
        .stagger-logo { animation-delay: 0.8s; opacity: 0; animation: linkIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; animation-delay: 0.8s; }

        /* 4. 'X' close button rotation */
        .close-rotate {
            animation: rotateIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes rotateIn {
            from { transform: rotate(0deg); opacity: 0; }
            to { transform: rotate(90deg); opacity: 1; }
        }

        .motion-label {
            position: absolute;
            background: rgba(80, 99, 83, 0.1);
            border-left: 2px solid #506353;
            padding: 4px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #506353;
            pointer-events: none;
        }
    </style>
</head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Mobile Navigation Overlay (Forcing Open State for Design Specification) -->
<div class="fixed inset-0 z-[100] bg-[#F5F0E8] curtain-fade flex flex-col items-center justify-center" id="mobile-nav">
<!-- Motion Annotation for Curtain -->
<div class="motion-label left-8 top-12 z-[110]">
            1. Full-screen curtain fade-in (0.8s, ease-out)
        </div>
<!-- Close Button -->
<button class="absolute top-12 right-12 p-2">
<span class="material-symbols-outlined text-3xl font-light close-rotate">close</span>
<div class="motion-label right-12 top-2 z-[110] whitespace-nowrap translate-y-2">
                4. Slow 90° rotation
            </div>
</button>
<!-- Navigation Links -->
<nav class="flex flex-col items-center space-y-8 mb-24 relative">
<a class="stagger-link font-serif-display italic text-5xl md:text-6xl text-on-surface hover:text-primary transition-colors" href="#">Philosophy</a>
<a class="stagger-link font-serif-display italic text-5xl md:text-6xl text-on-surface hover:text-primary transition-colors" href="#">Retreats</a>
<a class="stagger-link font-serif-display italic text-5xl md:text-6xl text-on-surface hover:text-primary transition-colors" href="#">Journal</a>
<a class="stagger-link font-serif-display italic text-5xl md:text-6xl text-on-surface hover:text-primary transition-colors" href="#">About</a>
<a class="stagger-link font-serif-display italic text-5xl md:text-6xl text-on-surface hover:text-primary transition-colors" href="#">Inquire</a>
<!-- Motion Annotations for Links -->
<div class="motion-label -left-48 top-0 z-[110] text-right">
                2. 0.1s stagger delay
            </div>
<div class="motion-label -left-48 bottom-0 z-[110] text-right">
                3. 20px drift &amp; fade
            </div>
</nav>
<!-- Logo -->
<div class="stagger-logo flex flex-col items-center">
<div class="h-[1px] w-24 bg-primary opacity-20 mb-12"></div>
<div class="font-body text-sm tracking-[0.8em] font-light text-on-surface uppercase">SEVEN SENSES</div>
</div>
</div>
<!-- Main Content Underneath (Simplified for focus) -->
<main class="blur-sm opacity-50">
<nav class="fixed top-0 w-full z-50 bg-[#F5F0E8]/80 backdrop-blur-md px-12 py-8">
<div class="font-headline text-xl tracking-[0.3em] font-light text-[#1C1A17]">SEVEN SENSES</div>
</nav>
<section class="h-screen flex items-center justify-center">
<h1 class="font-serif-display text-9xl font-light tracking-[0.2em] text-on-surface uppercase text-center">SEVEN<br/>SENSES</h1>
</section>
</main>
</body></html>
